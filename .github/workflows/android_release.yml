name: Android Release Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > whisper_native/app/sudoloser.jks
          else
            echo "Warning: KEYSTORE_BASE64 not set. Falling back to local jks if it exists."
            # If the jks is already in the repo (not recommended), it will be used.
            # Copy from root to app folder if present in root
            if [ -f "sudoloser.jks" ]; then
              cp sudoloser.jks whisper_native/app/sudoloser.jks
            fi
          fi

      - name: Grant execute permission for gradlew
        run: |
          cd whisper_native
          if [ ! -f "gradlew" ]; then
            gradle wrapper
          fi
          chmod +x gradlew

      - name: Build with Gradle
        env:
          KEYSTORE_PATH: "sudoloser.jks"
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
        run: |
          cd whisper_native
          ./gradlew assembleRelease

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: whisper-notes-release
          path: whisper_native/app/build/outputs/apk/release/*.apk
