name: Android Test Build

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode Keystore (Optional for Test)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > whisper_native/app/sudoloser.jks
          else
            echo "Secrets not available. Build will fallback to debug signing."
          fi

      - name: Grant execute permission for gradlew
        run: |
          cd whisper_native
          chmod +x gradlew

      - name: Build Test APK
        env:
          KEYSTORE_PATH: "sudoloser.jks"
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
        run: |
          cd whisper_native
          ./gradlew assembleRelease

      - name: Upload Test APK
        uses: actions/upload-artifact@v4
        with:
          name: whisper-notes-test-apk
          path: whisper_native/app/build/outputs/apk/release/*.apk
